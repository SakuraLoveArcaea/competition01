<!doctype html>
<html lang="en">
  <head>
    <script>
      // Check for a redirect path from 404.html in sessionStorage
      const redirectPath = sessionStorage.getItem('redirectPath');
      if (redirectPath) {
        // Clear the stored path to prevent loops
        sessionStorage.removeItem('redirectPath');
        // Use replaceState to update the URL without reloading the page.
        // This makes the browser's URL match what the user originally tried to access.
        // Vue Router will then pick up this path on initialization.
        window.history.replaceState(null, '', redirectPath);
      }
    </script>
